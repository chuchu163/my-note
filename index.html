<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 内容展示</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
            transform: translateY(-1px);
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .editor-container {
            display: none;
            margin-bottom: 20px;
        }

        .editor-container.active {
            display: block;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .edit-buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .content-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-height: 400px;
        }

        .markdown-body {
            line-height: 1.8;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }

        .markdown-body h1 {
            font-size: 2em;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.3em;
        }

        .markdown-body h2 {
            font-size: 1.5em;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.3em;
        }

        .markdown-body h3 {
            font-size: 1.25em;
        }

        .markdown-body p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .markdown-body code {
            background: #f3f4f6;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.875em;
        }

        .markdown-body pre {
            background: #1f2937;
            color: #e5e7eb;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
            margin-bottom: 16px;
        }

        .markdown-body li {
            margin-bottom: 0.25em;
        }

        .markdown-body blockquote {
            border-left: 4px solid #667eea;
            padding-left: 1em;
            color: #6b7280;
            margin: 0 0 16px 0;
        }

        .markdown-body a {
            color: #667eea;
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }

        .markdown-body th, .markdown-body td {
            border: 1px solid #e5e7eb;
            padding: 8px 12px;
            text-align: left;
        }

        .markdown-body th {
            background: #f9fafb;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .save-notification {
            position: fixed;
            top: 100px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .save-notification.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 Markdown 内容展示</h1>
        <div class="controls">
            <div class="file-input-wrapper">
                <button class="btn btn-primary">📁 导入文件</button>
                <input type="file" id="fileInput" accept=".md,.txt">
            </div>
            <button class="btn btn-primary" id="editBtn">✏️ 编辑内容</button>
            <button class="btn btn-success" id="saveBtn" style="display: none;">💾 保存</button>
        </div>
    </div>

    <div class="container">
        <div class="editor-container" id="editorContainer">
            <textarea id="markdownEditor" placeholder="在这里输入或粘贴 Markdown 内容..."></textarea>
            <div class="edit-buttons">
                <button class="btn btn-secondary" id="cancelBtn">取消</button>
            </div>
        </div>

        <div class="content-container">
            <div class="markdown-body" id="markdownContent">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <h3>还没有内容</h3>
                    <p>点击上方"导入文件"或"编辑内容"开始使用</p>
                </div>
            </div>
        </div>
    </div>

    <div class="save-notification" id="saveNotification">
        ✓ 内容已保存！
    </div>

    <script>
        const STORAGE_KEY = 'markdown_content';
        let isEditing = false;

        const fileInput = document.getElementById('fileInput');
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const editorContainer = document.getElementById('editorContainer');
        const markdownEditor = document.getElementById('markdownEditor');
        const markdownContent = document.getElementById('markdownContent');
        const saveNotification = document.getElementById('saveNotification');

        function init() {
            const savedContent = localStorage.getItem(STORAGE_KEY);
            if (savedContent) {
                renderMarkdown(savedContent);
            }
        }

        function renderMarkdown(text) {
            if (!text || text.trim() === '') {
                markdownContent.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <h3>还没有内容</h3>
                        <p>点击上方"导入文件"或"编辑内容"开始使用</p>
                    </div>
                `;
                return;
            }
            markdownContent.innerHTML = marked.parse(text);
        }

        function showNotification() {
            saveNotification.classList.add('show');
            setTimeout(() => {
                saveNotification.classList.remove('show');
            }, 2000);
        }

        function enterEditMode() {
            isEditing = true;
            const currentContent = localStorage.getItem(STORAGE_KEY) || '';
            markdownEditor.value = currentContent;
            editorContainer.classList.add('active');
            editBtn.style.display = 'none';
            saveBtn.style.display = 'inline-block';
        }

        function exitEditMode(save = false) {
            isEditing = false;
            if (save) {
                const content = markdownEditor.value;
                localStorage.setItem(STORAGE_KEY, content);
                renderMarkdown(content);
                showNotification();
            }
            editorContainer.classList.remove('active');
            editBtn.style.display = 'inline-block';
            saveBtn.style.display = 'none';
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const content = event.target.result;
                markdownEditor.value = content;
                localStorage.setItem(STORAGE_KEY, content);
                renderMarkdown(content);
                showNotification();
            };
            reader.readAsText(file);
            fileInput.value = '';
        });

        editBtn.addEventListener('click', enterEditMode);

        saveBtn.addEventListener('click', () => exitEditMode(true));

        cancelBtn.addEventListener('click', () => exitEditMode(false));

        init();
    </script>
</body>
</html>
